<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Kuis HSK 2 Bab 1 - Pilih Hanzi + Suara ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e3c72 0%, #2a5298 50%, #8b5cf6 100%);
            font-family: 'Simsun', '宋体', 'Times New Roman', serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-wrapper {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 250, 240, 0.98);
            border-radius: 70px 70px 60px 60px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .quiz-header {
            background: #fbbf24;
            padding: 18px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 6px solid #f59e0b;
        }

        .score-box, .question-counter {
            background: white;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.5rem;
            font-family: 'Simsun', '宋体', serif;
            box-shadow: 0 5px 0 #d97706;
            color: #1e293b;
        }

        .score-box span, .question-counter span {
            color: #dc2626;
            font-size: 2rem;
            margin-right: 8px;
        }

        .timer-area {
            background: #fef9e3;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            border-bottom: 2px dashed #fcd34d;
        }

        .timer-label {
            font-weight: 700;
            font-size: 1.2rem;
            background: #facc15;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Simsun', '宋体', serif;
        }

        .progress-bar-container {
            flex: 2;
            background-color: #e2e8f0;
            border-radius: 40px;
            height: 24px;
            overflow: hidden;
        }

        .time-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 40px;
            transition: width 0.1s linear;
        }

        .time-warning {
            background: linear-gradient(90deg, #ef4444, #f97316);
        }

        .timer-digit {
            font-family: monospace;
            font-size: 2rem;
            font-weight: 800;
            background: #0f172a;
            color: #fef9c3;
            padding: 6px 22px;
            border-radius: 60px;
            min-width: 130px;
            text-align: center;
        }

        .question-area {
            padding: 35px 35px 20px;
            text-align: center;
        }

        .question-card {
            background: #fff7ed;
            border-radius: 80px;
            padding: 25px 20px;
            box-shadow: 0 12px 0 #fdba74;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #7c2d12;
            background: #ffedd5;
            padding: 18px;
            border-radius: 70px;
            font-family: 'Simsun', '宋体', serif;
            line-height: 1.4;
        }

        .question-text span {
            background: #fde68a;
            padding: 8px 28px;
            border-radius: 60px;
            display: inline-block;
        }

        .feedback-message {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 60px;
            margin: 15px 0 10px;
            background: #f1f5f9;
            font-family: 'Simsun', '宋体', serif;
            transition: 0.2s;
        }

        .all-vocab-grid {
            background: #fef3c7;
            border-radius: 70px;
            padding: 25px;
            margin: 15px 0 20px;
            box-shadow: inset 0 0 0 3px white, 0 10px 25px rgba(0,0,0,0.1);
        }

        .grid-title {
            font-size: 1.3rem;
            font-weight: 800;
            background: #ffedd5;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 40px;
            margin-bottom: 20px;
            color: #b45309;
            font-family: 'Simsun', '宋体', serif;
        }

        .vocab-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 16px;
            max-height: 360px;
            overflow-y: auto;
            padding: 10px;
        }

        .vocab-btn {
            background: linear-gradient(135deg, #ffffff, #fef9e6);
            border: 3px solid #f59e0b;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Simsun', '宋体', monospace;
            color: #3b2b1f;
            cursor: pointer;
            transition: 0.1s linear;
            text-align: center;
            letter-spacing: 2px;
            box-shadow: 0 5px 0 #d97706;
        }

        .vocab-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            background: #fffbeb;
            border-color: #fbbf24;
            box-shadow: 0 7px 0 #d97706;
        }

        .vocab-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d97706;
        }

        .vocab-btn.disabled-btn, .vocab-btn:disabled {
            opacity: 0.55;
            transform: translateY(0px);
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        .restart-btn {
            background: #f97316;
            border: none;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 14px 36px;
            border-radius: 70px;
            color: white;
            margin: 10px auto 25px;
            display: block;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Simsun', '宋体', sans-serif;
            width: fit-content;
            box-shadow: 0 7px 0 #c2410c;
        }

        .restart-btn:hover {
            background: #ea580c;
            transform: scale(0.97);
            box-shadow: 0 4px 0 #c2410c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
            background: #ffedd5;
            color: #92400e;
            font-weight: 700;
            font-family: 'Simsun', '宋体', serif;
        }

        @media (max-width: 700px) {
            .vocab-select-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                max-height: 300px;
            }
            .vocab-btn { font-size: 1.1rem; padding: 10px 4px; }
            .question-text { font-size: 1.6rem; }
            .timer-digit { font-size: 1.5rem; min-width: 100px; }
            .score-box, .question-counter { font-size: 1.2rem; padding: 6px 18px; }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper" id="quizApp">
    <div class="quiz-header">
        <div class="score-box">🏆 SKOR : <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 SOAL <span id="currentQ">1</span> / <span id="totalQ"></span></div>
    </div>
    <div class="timer-area">
        <div class="timer-label">⏳ WAKTU TERSISA</div>
        <div class="progress-bar-container">
            <div class="time-progress" id="timeProgress" style="width: 100%;"></div>
        </div>
        <div class="timer-digit" id="timerDisplay">20 detik</div>
    </div>
    <div class="question-area">
        <div class="question-card">
            <div class="question-text" id="questionText">✨ Siap? ✨</div>
        </div>
        <div class="feedback-message" id="feedbackMsg">🌸 by lcnpalembang-08994477998! 🌸</div>
        
        <div class="all-vocab-grid">
            <div class="grid-title">📚 Klik Hanzi yang Sesuai dengan Arti 📚</div>
            <div class="vocab-select-grid" id="allVocabGrid"></div>
        </div>
        <div class="next-hint" style="font-family:'Simsun',serif; font-size:1.1rem;">⏱️ Setiap soal hanya 20 detik! Pilih Hanzi sebelum waktu habis.</div>
    </div>
    <button class="restart-btn" id="restartQuizBtn">🔄 MAIN LAGI (Acak Soal & Pilihan) 🔄</button>
    <footer>🎈 HSK 2 Bab 1 - Font Simsun besar + Suara Semangat (benar) & Peringatan (salah) 🎈</footer>
</div>

<script>
    // ======================= DATA KOSAKATA =======================
    const MASTER_VOCAB = [
        { hanzi: "介绍", arti: "Memperkenalkan" },
        { hanzi: "有时", arti: "Terkadang" },
        { hanzi: "懂", arti: "Mengerti; paham" },
        { hanzi: "意思", arti: "Arti; makna" },
        { hanzi: "北京烤鸭", arti: "Bebek Panggang Peking" },
        { hanzi: "不好意思", arti: "Merasa tidak enak hati; malu; maaf" },
        { hanzi: "旅游", arti: "Berwisata; bepergian" },
        { hanzi: "帮忙", arti: "Membantu; menolong" },
        { hanzi: "请", arti: "Mohon; mengajak; mentraktir" },
        { hanzi: "让", arti: "Membiarkan; menyuruh" },
        { hanzi: "叫", arti: "Memanggil; memerintahkan" },
        { hanzi: "吧", arti: "Partikel untuk saran atau ajakan" },
        { hanzi: "已经", arti: "Sudah" },
        { hanzi: "给", arti: "Memberi; untuk; kepada" },
        { hanzi: "完", arti: "Selesai" },
        { hanzi: "次", arti: "Kali (frekuensi)" },
        { hanzi: "姓名", arti: "Nama lengkap" },
        { hanzi: "时间", arti: "Waktu" },
        { hanzi: "问题", arti: "Masalah; pertanyaan" },
        { hanzi: "饭店", arti: "Restoran; hotel" },
        { hanzi: "超市", arti: "Supermarket" },
        { hanzi: "学校", arti: "Sekolah" },
        { hanzi: "学习", arti: "Belajar" },
        { hanzi: "下班", arti: "Pulang kerja" },
        { hanzi: "买菜", arti: "Membeli sayur; belanja dapur" },
        { hanzi: "今天", arti: "Hari ini" },
        { hanzi: "明天", arti: "Besok" },
        { hanzi: "星期天", arti: "Hari Minggu" },
        { hanzi: "北京", arti: "Beijing" },
        { hanzi: "上海", arti: "Shanghai" },
        { hanzi: "西安", arti: "Xi'an" }
    ];
    const TOTAL_VOCAB = MASTER_VOCAB.length;

    // ----------------------- SISTEM SUARA (Web Audio) -----------------------
    let audioCtx = null;
    // Fungsi inisialisasi AudioContext (dipanggil saat pertama kali butuh suara)
    function initAudio() {
        if (audioCtx) return audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Biarkan suspended, akan di-resume saat pertama main
            return audioCtx;
        } catch(e) {
            console.warn("Web Audio tidak didukung");
            return null;
        }
    }

    // Memainkan nada sederhana (frequency Hz, duration detik, volume 0-1)
    function playTone(frequency, duration, volume = 0.3) {
        if (!initAudio()) return;
        // Resume context jika suspended (perlu user gesture, tapi biasanya sudah ada klik restart atau jawaban)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                playToneInternal(frequency, duration, volume);
            }).catch(e => console.log);
        } else {
            playToneInternal(frequency, duration, volume);
        }
    }

    function playToneInternal(frequency, duration, volume) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = frequency;
        gainNode.gain.value = volume;
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + duration);
        oscillator.stop(now + duration);
    }

    // Suara benar: dua nada ceria (G dan E)
    function playCorrectSound() {
        // Nada pertama: 880Hz (A5) selama 0.15 detik, lalu nada 1100Hz
        playTone(880, 0.12, 0.25);
        setTimeout(() => {
            playTone(1100, 0.2, 0.25);
        }, 130);
        // tambahan nada ketiga biar happy
        setTimeout(() => {
            playTone(1320, 0.25, 0.2);
        }, 280);
    }

    // Suara salah: nada rendah dan 'buzz' (tremolo)
    function playWrongSound() {
        // Nada rendah 220Hz dengan sedikit getaran (cepat naik-turun gain)
        if (!audioCtx) return;
        const ctx = audioCtx;
        if (ctx.state === 'suspended') {
            ctx.resume().then(() => playWrongInternal()).catch(e=>console.log);
        } else {
            playWrongInternal();
        }
    }
    function playWrongInternal() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 220; // A3 rendah
        gain.gain.value = 0.35;
        osc.start();
        // efek tremolo cepat
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.connect(lfoGain);
        lfoGain.connect(gain.gain);
        lfo.frequency.value = 18;
        lfoGain.gain.value = 0.25;
        lfo.start();
        // matikan setelah 0.5 detik
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        osc.stop(now + 0.5);
        lfo.stop(now + 0.5);
    }
    // -------------------------------------------------------------------------

    // State kuis
    let currentQuestionsOrder = [];
    let currentVocabOrder = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval = null;
    let timeLeft = 20;
    let isAnswered = false;
    let nextTimeout = null;
    let currentQuestionVocab = null;

    // DOM elements
    const questionTextEl = document.getElementById("questionText");
    const allVocabGrid = document.getElementById("allVocabGrid");
    const scoreSpan = document.getElementById("scoreValue");
    const currentQSpan = document.getElementById("currentQ");
    const totalQSpan = document.getElementById("totalQ");
    const timerDisplayDiv = document.getElementById("timerDisplay");
    const timeProgressDiv = document.getElementById("timeProgress");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");
    const restartBtn = document.getElementById("restartQuizBtn");

    // Helper acak
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateRandomQuestionsOrder() {
        return shuffleArray([...Array(TOTAL_VOCAB).keys()]);
    }

    function generateRandomVocabOrder() {
        return shuffleArray([...MASTER_VOCAB]);
    }

    function buildAllVocabButtons(vocabOrderArray) {
        allVocabGrid.innerHTML = "";
        vocabOrderArray.forEach(vocabItem => {
            const btn = document.createElement("button");
            btn.className = "vocab-btn";
            btn.innerText = vocabItem.hanzi;
            btn.setAttribute("data-hanzi", vocabItem.hanzi);
            btn.addEventListener("click", (e) => {
                if (isAnswered) return;
                const selectedHanzi = vocabItem.hanzi;
                const isCorrect = (selectedHanzi === currentQuestionVocab.hanzi);
                finishAndNext(isCorrect, selectedHanzi);
            });
            allVocabGrid.appendChild(btn);
        });
    }

    function disableAllVocabButtons(disabled) {
        const btns = document.querySelectorAll(".vocab-btn");
        btns.forEach(btn => {
            if (disabled) {
                btn.disabled = true;
                btn.classList.add("disabled-btn");
            } else {
                btn.disabled = false;
                btn.classList.remove("disabled-btn");
            }
        });
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function updateTimerUI() {
        timerDisplayDiv.innerText = `${timeLeft} detik`;
        let percent = (timeLeft / 20) * 100;
        timeProgressDiv.style.width = `${percent}%`;
        if (timeLeft <= 5) {
            timeProgressDiv.classList.add("time-warning");
            timerDisplayDiv.style.background = "#b91c1c";
            timerDisplayDiv.style.color = "#fff3c9";
        } else {
            timeProgressDiv.classList.remove("time-warning");
            timerDisplayDiv.style.background = "#0f172a";
            timerDisplayDiv.style.color = "#fef9c3";
        }
    }

    function startTimerForCurrent() {
        if (timerInterval) stopTimer();
        timeLeft = 20;
        updateTimerUI();
        timerInterval = setInterval(() => {
            if (isAnswered) return;
            if (timeLeft <= 1) {
                if (!isAnswered) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    finishAndNext(false, null, true);
                }
            } else {
                timeLeft--;
                updateTimerUI();
            }
        }, 1000);
    }

    function finishAndNext(isCorrect, selectedHanzi, isTimeout = false) {
        if (isAnswered) return;
        isAnswered = true;
        stopTimer();

        // MAIN SUARA!!!
        if (isCorrect) {
            playCorrectSound();
            score++;
            scoreSpan.innerText = score;
            feedbackMsgDiv.innerHTML = "✅🎉 BENAR! +1 poin 🎉✅  (suara gembira)";
            feedbackMsgDiv.style.background = "#d1fae5";
            feedbackMsgDiv.style.color = "#065f46";
        } else {
            playWrongSound();
            let correctAnswer = currentQuestionVocab.hanzi;
            if (isTimeout) {
                feedbackMsgDiv.innerHTML = `⏰ WAKTU HABIS! Hanzi yang benar: "${correctAnswer}" ⏰ (suara peringatan)`;
            } else {
                feedbackMsgDiv.innerHTML = `❌ Kurang tepat! Hanzi yang benar: "${correctAnswer}" ❌ (suara peringatan)`;
            }
            feedbackMsgDiv.style.background = "#fee2e2";
            feedbackMsgDiv.style.color = "#991b1b";
        }

        disableAllVocabButtons(true);
        if (nextTimeout) clearTimeout(nextTimeout);
        nextTimeout = setTimeout(() => {
            moveToNextQuestion();
        }, 1300);
    }

    function renderQuestion() {
        isAnswered = false;
        if (nextTimeout) clearTimeout(nextTimeout);
        feedbackMsgDiv.style.background = "#f1f5f9";
        feedbackMsgDiv.style.color = "#1e293b";
        feedbackMsgDiv.innerHTML = "🌸 by lcnpalembang-08994477998 🌸";

        const vocabIndex = currentQuestionsOrder[currentIndex];
        currentQuestionVocab = { ...MASTER_VOCAB[vocabIndex] };
        const artiTarget = currentQuestionVocab.arti;
        questionTextEl.innerHTML = `📖 <span>Arti : “${artiTarget}”</span><br> ✨ Pilih Hanzi yang tepat ✨`;

        currentQSpan.innerText = currentIndex + 1;
        totalQSpan.innerText = TOTAL_VOCAB;

        disableAllVocabButtons(false);
        startTimerForCurrent();
    }

    function moveToNextQuestion() {
        stopTimer();
        if (currentIndex + 1 < TOTAL_VOCAB) {
            currentIndex++;
            renderQuestion();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        stopTimer();
        isAnswered = true;
        disableAllVocabButtons(true);
        questionTextEl.innerHTML = "🏁✨ SELAMAT! Kuis Selesai ✨🏁";
        
        const finalMessage = document.createElement("div");
        finalMessage.style.fontSize = "1.8rem";
        finalMessage.style.fontWeight = "bold";
        finalMessage.style.textAlign = "center";
        finalMessage.style.background = "#fde68a";
        finalMessage.style.padding = "25px";
        finalMessage.style.borderRadius = "70px";
        finalMessage.style.margin = "15px 0";
        finalMessage.style.fontFamily = "'Simsun', '宋体', serif";
        
        let starMsg = "";
        if (score === TOTAL_VOCAB) starMsg = "🌟🌟🌟🌟🌟 LUAR BIASA! Juara Mandarin!";
        else if (score >= TOTAL_VOCAB - 5) starMsg = "⭐⭐⭐⭐ HEBAT! Terus belajar!";
        else starMsg = "⭐⭐⭐ Semangat! Coba lagi ya!";
        finalMessage.innerHTML = `🏆 Skor Akhir: ${score} / ${TOTAL_VOCAB} 🏆<br>${starMsg}`;
        
        allVocabGrid.innerHTML = "";
        allVocabGrid.appendChild(finalMessage);
        feedbackMsgDiv.innerHTML = "🎉 Tekan 'MAIN LAGI' untuk tantangan baru dengan soal & posisi Hanzi yang diacak! 🎉";
        feedbackMsgDiv.style.background = "#fef3c7";
        timerDisplayDiv.innerText = "Selesai!";
        timeProgressDiv.style.width = "0%";
    }

    function restartQuiz() {
        if (timerInterval) clearInterval(timerInterval);
        if (nextTimeout) clearTimeout(nextTimeout);
        
        currentIndex = 0;
        score = 0;
        isAnswered = false;
        scoreSpan.innerText = "0";
        
        currentQuestionsOrder = generateRandomQuestionsOrder();
        currentVocabOrder = generateRandomVocabOrder();
        
        buildAllVocabButtons(currentVocabOrder);
        renderQuestion();

        // Pastikan AudioContext siap dan resume (agar suara bisa langsung saat jawaban pertama)
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().catch(e=>console.log);
        } else if (!audioCtx) {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(e=>console.log);
            }
        }
    }

    function init() {
        totalQSpan.innerText = TOTAL_VOCAB;
        // inisialisasi audio (belum aktif, menunggu interaksi pertama)
        initAudio();
        restartQuiz();
        restartBtn.addEventListener("click", () => {
            restartQuiz();
        });
        // Tambahkan event listener global agar audio context bisa di-resume saat klik pertama kali di mana pun
        document.body.addEventListener("click", function resumeAudio() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    console.log("Audio diaktifkan");
                }).catch(e=>console.log);
            }
        }, { once: true });
    }

    init();
</script>
</body>
</html>
